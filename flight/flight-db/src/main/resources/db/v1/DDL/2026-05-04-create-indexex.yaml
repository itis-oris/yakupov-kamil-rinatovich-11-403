databaseChangeLog:
  - changeSet:
      id: 20260504-create-fare_airline_code_cabin_class-index
      author: yakupov
      changes:
        - createIndex:
            tableName: fare
            indexName: idx_fare_airline_code_cabin_class
            unique: false
            columns:
              - column:
                  name: airline_code
              - column:
                  name: cabin_class
  - changeSet:
      id: 20260504-create-pricing_adjustment_flight_id_fare_id-index
      author: yakupov
      changes:
        - createIndex:
            tableName: pricing_adjustment
            indexName: idx_pricing_adjustment_flight_id_fare_id
            unique: true
            columns:
              - column:
                  name: flight_id
              - column:
                  name: fare_id

  - changeSet:
      id: 20260504-create-seat_reserved_held_by_booking_id_status-index
      author: yakupov
      changes:
        - createIndex:
            tableName: seat_reserved
            indexName: idx_seat_reserved_held_by_booking_id_status
            unique: false
            columns:
              - column:
                  name: held_by_booking_id
              - column:
                  name: status