services:

  postgres:
    image: postgres:16
    container_name: oris-flight-postgres
    networks:
      - oris-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: oris-flight-redis
    networks:
      - oris-network
    volumes:
      - redis-data:/data

  flight:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oris-flight-service
    ports:
      - "8080:8080"
    networks:
      - oris-network
    depends_on:
      - postgres
      - redis
    environment:
      SERVER_PORT: 8080

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}

      AUTH_SERVICE_URL: http://oris-auth-service:8081

      APPLICATION_PRICING_SECRET: ${APPLICATION_PRICING_SECRET}

networks:
  oris-network:
    external: true

volumes:
  postgres-data:
  redis-data: