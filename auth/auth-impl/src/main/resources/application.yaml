server:
  port: ${SERVER_PORT}

spring:
  application:
    name: oris-auth-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${DSPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}

  session:
    store-type: none

  liquibase:
    change-log: classpath:db/database-changelog-master.yaml
    enabled: true

  jackson:
    deserialization:
      fail-on-unknown-properties: true
      read-unknown-enum-values-as-null: false

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXP}
  refresh-token-expiration: ${JWT_REFRESH_EXP}
  max-refresh-token-count: ${JWT_MAX_REFRESH}