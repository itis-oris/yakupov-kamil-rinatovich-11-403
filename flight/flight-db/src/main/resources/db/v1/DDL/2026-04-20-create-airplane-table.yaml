databaseChangeLog:
  - changeSet:
      id: 20260420-create-airplane-table
      author: yakupov
      changes:
        - createTable:
            remarks: "Таблица с данными о конкретных бортах самолетов"
            tableName: airplane
            columns:
              - column:
                  remarks: "Айди борта"
                  name: id
                  type: uuid
                  defaultValueComputed: "gen_random_uuid()"
                  constraints:
                    primaryKey: true
                    nullable: false
                    primaryKeyName: airplane_id_pk
                    notNullConstraintName: airplane_id_nn
              - column:
                  remarks: "Номер борта(RA-73025, N12345)"
                  name: number
                  type: text
                  constraints:
                    nullable: false
                    notNullConstraintName: airplane_number_nn
                    unique: true
                    uniqueConstraintName: airplane_number_uq
              - column:
                  remarks: "Код типа самолета(airplane(fk) -> airplane_type(pk))"
                  name: airplane_type_code
                  type: char(3)
                  constraints:
                    nullable: false
                    notNullConstraintName: airplane_airplane_type_code_nn
              - column:
                  remarks: "Код авиакомпании(airplane(fk) -> airline(pk))"
                  name: airline_code
                  type: char(2)
                  constraints:
                    nullable: false
                    notNullConstraintName: airplane_airline_code_nn
              - column:
                  remarks: "Код производства"
                  name: manufactured_year
                  type: smallint
                  constraints:
                    nullable: false
                    notNullConstraintName: airplane_manufactured_year_nn
              - column:
                  remarks: "Является ли борт активным"
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
                    notNullConstraintName: airplane_is_active_nn
  - changeSet:
      id: 20260420-add-airplane-fk
      author: yakupov
      changes:
        - addForeignKeyConstraint:
            baseTableName: airplane
            baseColumnNames: airplane_type_code
            referencedTableName: airplane_type
            referencedColumnNames: code
            constraintName: airplane_airplane_type_code_fk
        - addForeignKeyConstraint:
            baseTableName: airplane
            baseColumnNames: airline_code
            referencedTableName: airline
            referencedColumnNames: code
            constraintName: airplane_airline_code_fk